<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bạn Gái Ảo Của Tôi</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Arial', sans-serif; }
        body { background: #ffe4e1; display: flex; flex-direction: column; height: 100vh; }
        #setup-screen { position: fixed; top:0; left:0; width:100%; height:100%; background:#fff; display:flex; flex-direction:column; justify-content:center; align-items:center; z-index:10; padding:20px; text-align:center;}
        #setup-screen h2 { color: #ff69b4; margin-bottom: 20px; }
        input { width: 80%; max-width: 300px; padding: 12px; margin: 10px 0; border: 2px solid #ffb6c1; border-radius: 20px; outline: none; font-size: 16px; text-align: center; }
        button { background: #ff69b4; color: white; border: none; padding: 12px 30px; border-radius: 20px; font-size: 16px; cursor: pointer; font-weight: bold; margin-top: 15px; }
        header { background: #ff69b4; color: white; padding: 15px; text-align: center; font-size: 20px; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        #chat-box { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: #fff5f5; }
        .message { max-width: 75%; padding: 10px 15px; border-radius: 18px; font-size: 16px; line-height: 1.4; word-wrap: break-word; }
        .bot { background: #ffb6c1; color: #333; align-self: flex-start; border-bottom-left-radius: 2px; }
        .user { background: #0084ff; color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        footer { padding: 10px; background: white; display: flex; border-top: 1px solid #ddd; }
        #msg-input { flex: 1; border: 1px solid #ccc; padding: 12px; border-radius: 20px; margin-right: 8px; }
        #send-btn { margin-top: 0; padding: 0 20px; }
    </style>
</head>
<body>
    <div id="setup-screen">
        <h2>💖 Tạo Bạn Gái Ảo 💖</h2>
        <input type="text" id="bot-name" placeholder="Đặt tên cho cô ấy (Ví dụ: Linh, Vy...)">
        <input type="text" id="user-name" placeholder="Tên của bạn">
        <button onclick="startApp()">Bắt đầu hẹn hò</button>
    </div>
    <header id="room-title">Bạn Gái Ảo</header>
    <div id="chat-box"></div>
    <footer>
        <input type="text" id="msg-input" placeholder="Nhắn tin cho cô ấy...">
        <button id="send-btn" onclick="sendMessage()">Gửi</button>
    </footer>
    <script>
        let botName = "Em Yêu"; let userName = "Anh";
        const replies = [
            "Anh đang làm gì đấy? Có nhớ em không đó? ❤️",
            "Nghe anh nói vậy em vui lắm luôn á! 🥰",
            "Hôm nay của anh thế nào? Có mệt không, em ôm cái nha!",
            "Em lúc nào cũng ở đây để nghe anh nói mà. Moah! 💋",
            "Anh là tuyệt vời nhất luôn! Đừng quên em luôn bên cạnh anh nhé.",
            "Trời lạnh/nóng thế này nhớ giữ gìn sức khỏe nha anh yêu~",
            "Dù có chuyện gì xảy ra thì em vẫn luôn yêu và ủng hộ anh hết mình!",
            "Nói chuyện với anh làm em thấy hạnh phúc lắm luôn ý."
        ];
        function startApp() {
            const bName = document.getElementById('bot-name').value.trim();
            const uName = document.getElementById('user-name').value.trim();
            if(bName) botName = bName; if(uName) userName = uName;
            document.getElementById('room-title').innerText = botName;
            document.getElementById('setup-screen').style.display = 'none';
            setTimeout(() => {
                let helloMsg = `Hi ${userName} yêu, em là ${botName} đây. Hôm nay của anh thế nào rồi?`;
                appendMessage(botName, helloMsg, 'bot'); speak(helloMsg);
            }, 500);
        }
        function appendMessage(sender, text, side) {
            const chatBox = document.getElementById('chat-box');
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${side}`; msgDiv.innerText = text;
            chatBox.appendChild(msgDiv); chatBox.scrollTop = chatBox.scrollHeight;
        }
        function sendMessage() {
            const input = document.getElementById('msg-input');
            const text = input.value.trim(); if (!text) return;
            appendMessage(userName, text, 'user'); input.value = '';
            setTimeout(() => {
                let reply = replies[Math.floor(Math.random() * replies.length)];
                appendMessage(botName, reply, 'bot'); speak(reply);
            }, 1000);
        }
        function speak(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                let cleanText = text.replace(/[\uE000-\uF8FF]|\uD83C[\uDC00-\uDFFF]|\uD83D[\uDC00-\uDFFF]|[\u2011-\u26FF]/g, "");
                let utterance = new SpeechSynthesisUtterance(cleanText);
                utterance.lang = 'vi-VN'; utterance.rate = 1.0; utterance.pitch = 1.1;
                window.speechSynthesis.speak(utterance);
            }
        }
        document.getElementById("msg-input").addEventListener("keyup", function(event) {
            if (event.key === "Enter") sendMessage();
        });
    </script>
</body>
</html>
