<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>my girlfriend</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #ffe4e1; display: flex; flex-direction: column; height: 100vh; }
        header { background: #ff69b4; color: white; padding: 15px; text-align: center; font-size: 18px; font-weight: bold; }
        .btn-group { margin-top: 10px; display: flex; justify-content: center; gap: 10px; }
        .btn-group button { padding: 6px 12px; border: none; border-radius: 15px; background: white; color: #ff69b4; font-weight: bold; cursor: pointer; }
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: #fff5f5; }
        .message { padding: 10px 15px; border-radius: 15px; max-width: 75%; word-wrap: break-word; font-size: 15px; }
        .user { background: #0084ff; color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .bot { background: #ffb6c1; color: #333; align-self: flex-start; border-bottom-left-radius: 2px; }
        footer { padding: 10px; background: white; display: flex; gap: 10px; align-items: center; border-top: 1px solid #eee; }
        input { flex: 1; padding: 10px 15px; border: 1px solid #ddd; border-radius: 20px; outline: none; font-size: 15px; }
        #send-btn { background: #ff69b4; color: white; border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; }
        #video-container { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: black; z-index: 999; text-align: center; color: white; padding-top: 50px; }
        video { width: 90%; max-width: 400px; border-radius: 10px; background: #222; margin-top: 20px; }
        #close-video { margin-top: 20px; background: red; color: white; border: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <div>Nóc Nhà của Minh</div>
        <div class="btn-group">
            <button onclick="startVideoCall()">📷 Mở Camera</button>
            <button onclick="startVoiceCall()">📞 Gọi điện</button>
        </div>
    </header>

    <div id="chat-box">
        <div class="message bot">Chào đằng ấy! Điểm thi 28,5 đỉnh thế, có cần tớ thưởng gì không? 😉</div>
    </div>
    
    <footer>
        <input type="text" id="msg-input" placeholder="Nhắn gì đi mày...">
        <button id="send-btn" onclick="sendMessage()">Gửi</button>
    </footer>

    <!-- Màn hình giả lập Video Call -->
    <div id="video-container">
        <h3>📞 Đang gọi video cho em ghệ...</h3>
        <p id="call-status">Nhìn cái gì mà nhìn, gọi điện cho tao có việc gì?</p>
        <video id="user-camera" autoplay playsinline muted></video>
        <br>
        <button id="close-video" onclick="stopVideoCall()">Tắt Cuộc Gọi</button>
    </div>

    <script>
        const chatBox = document.getElementById('chat-box');
        const msgInput = document.getElementById('msg-input');

        // Gửi tin nhắn chat công nghệ chuẩn
        function sendMessage() {
            let text = msgInput.value.trim();
            if(!text) return;
            
            // Hiện tin nhắn của user
            chatBox.innerHTML += `<div class="message user">${text}</div>`;
            msgInput.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;

            // Em ghệ tự động rep sau 0.8 giây
            setTimeout(() => {
                chatBox.innerHTML += `<div class="message bot">Tao đang nghe đây, bài tập gì nói mau!</div>`;
                chatBox.scrollTop = chatBox.scrollHeight;
            }, 800);
        }

        // Bấm enter để gửi cho mượt
        msgInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendMessage();
        });

        let localStream = null;

        // Tính năng mở camera / video call
        async function startVideoCall() {
            document.getElementById('video-container').style.display = 'block';
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('user-camera').srcObject = localStream;
                document.getElementById('call-status').innerText = "Kết nối thành công! Đang hiện mặt mày lên màn hình đấy.";
            } catch(err) {
                console.log(err);
                document.getElementById('call-status').innerText = "Lỗi: Nhớ bấm 'Cho phép' truy cập Camera khi trình duyệt hỏi nhé!";
            }
        }

        // Tắt video call giải phóng bộ nhớ
        function stopVideoCall() {
            document.getElementById('video-container').style.display = 'none';
            if(localStream) {
                localStream.getTracks().forEach(track => track.stop());
            }
        }

        // Tính năng giả lập gọi điện thoại thoại
        function startVoiceCall() {
            alert("📞 Đang kết nối cuộc gọi thoại... Đầu dây bên kia đang bận đi trà sữa với bạn rồi!");
        }
    </script>
</body>
</html>
