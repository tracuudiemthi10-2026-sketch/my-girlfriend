<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>my girlfriend</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #ffe4e1; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { background: #ff69b4; color: white; padding: 15px; text-align: center; font-size: 18px; font-weight: bold; z-index: 10; }
        .btn-group { margin-top: 10px; display: flex; justify-content: center; gap: 10px; }
        .btn-group button { padding: 6px 12px; border: none; border-radius: 15px; background: white; color: #ff69b4; font-weight: bold; cursor: pointer; }
        
        .avatar-container { text-align: center; background: #fff5f5; padding-top: 15px; }
        .avatar-img { width: 90px; height: 90px; border-radius: 50%; object-fit: cover; border: 3px solid #ff69b4; }
        
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: #fff5f5; }
        .message { padding: 10px 15px; border-radius: 15px; max-width: 75%; word-wrap: break-word; font-size: 15px; }
        .user { background: #0084ff; color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .bot { background: #ffb6c1; color: #333; align-self: flex-start; border-bottom-left-radius: 2px; }
        
        footer { padding: 10px; background: white; display: flex; gap: 5px; align-items: center; border-top: 1px solid #eee; z-index: 10; }
        input { flex: 1; padding: 10px 15px; border: 1px solid #ddd; border-radius: 20px; outline: none; font-size: 15px; }
        button.action-btn { background: #ff69b4; color: white; border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; }

        /* Giao diện Video Call VIP */
        #video-container { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #111; z-index: 999; }
        #bot-video-stream { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; }
        #user-camera { width: 100px; height: 140px; border-radius: 8px; background: #222; position: absolute; top: 20px; right: 20px; object-fit: cover; border: 2px solid white; z-index: 1001; }
        .video-controls { position: absolute; bottom: 40px; left: 0; width: 100%; text-align: center; z-index: 1001; }
        #call-status { color: white; text-shadow: 0 2px 4px rgba(0,0,0,0.8); font-size: 16px; margin-bottom: 15px; padding: 0 20px; }
        #close-video { background: #ff3b30; color: white; border: none; padding: 12px 30px; border-radius: 25px; font-weight: bold; font-size: 16px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
    </style>
</head>
<body>

    <header>
        <div>Nóc Nhà của Minh</div>
        <div class="btn-group">
            <button onclick="startVoiceCall()">🎤 liên tục  (sủa)</button>
            <button onclick="startVideoCall()">📞 Call Video</button>
        </div>
    </header>

    <div class="avatar-container">
        <img class="avatar-img" src="513.jpg" alt="My Girlfriend">
    </div>

    <div id="chat-box">
        <div class="message bot">m bt mhắn tin k hả nhắn thì dell rep</div>
    </div>
    
    <footer>
        <input type="text" id="msg-input" placeholder="Nhắn gì đi mày...">
        <button class="action-btn" id="send-btn" onclick="sendMessage()">Gửi</button>
    </footer>

    <div id="video-container">
        <video id="bot-video-stream" loop playsinline muted></video>
        <video id="user-camera" autoplay playsinline muted></video>
        <div class="video-controls">
            <p id="call-status">Đang FaceTime với em người yêu siêu cấp đáng yêu... </p>
            <button id="close-video" onclick="stopVideoCall()">Tắt Cuộc Gọi</button>
        </div>
    </div>

    <script>
        const GEMINI_API_KEY = "Gen-lang-client-0521782616"; 
        const chatBox = document.getElementById('chat-box');
        const msgInput = document.getElementById('msg-input');
        let localStream = null;

        async function askAI(userMessage) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`;
            const systemInstruction = "Bạn là người yêu ảo của một bạn nam tên là Ngố (học sinh lớp 9 chuyên Toán, học giỏi). Hãy trả lời thật dễ thương, xưng hô mày - tao hoặc gọi nó là mày, đôi khi hơi dỗi hờn, nũng nịu một chút, sử dụng tiếng Việt Gen Z của học sinh.";

            const promptData = {
                contents: [{ parts: [{ text: userMessage }] }],
                systemInstruction: { parts: [{ text: systemInstruction }] }
            };

            try {
                let response = await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(promptData)
                });
                let data = await response.json();
                return data.candidates[0].content.parts[0].text;
            } catch (error) {
                console.error(error);
                return "mày ơi, mạng bên tớ đang lag một chút, mày nói lại được không?";
            }
        }

        async function sendMessage() {
            let text = msgInput.value.trim();
            if(!text) return;
            chatBox.innerHTML += `<div class="message user">${text}</div>`;
            msgInput.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;
            let typingId = "typing-" + Date.now();
            chatBox.innerHTML += `<div class="message bot" id="${typingId}">Đang suy nghĩ...</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
            let aiReply = await askAI(text);
            document.getElementById(typingId).innerText = aiReply;
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        msgInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendMessage();
        });

        function startVoiceCall() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) { alert("Trình duyệt không hỗ trợ giọng nói!"); return; }
            const recognition = new SpeechRecognition();
            recognition.lang = 'vi-VN';
            chatBox.innerHTML += `<div class="message bot" style="background:#fff3cd;">🎙️ Đang nghe mày nói đây... Hãy nói vào micro đi!</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
            recognition.start();
            recognition.onresult = async function(event) {
                let speechToText = event.results[0][0].transcript;
                chatBox.innerHTML += `<div class="message user">${speechToText}</div>`;
                chatBox.scrollTop = chatBox.scrollHeight;
                let typingId = "typing-" + Date.now();
                chatBox.innerHTML += `<div class="message bot" id="${typingId}">Đang suy nghĩ...</div>`;
                let aiReply = await askAI(speechToText);
                document.getElementById(typingId).innerText = aiReply;
                chatBox.scrollTop = chatBox.scrollHeight;
            };
        }

        async function startVideoCall() {
            document.getElementById('video-container').style.display = 'block';
            let botVideo = document.getElementById('bot-video-stream');
            botVideo.src = "ghe-ao.mp4"; 
            botVideo.play().catch(e => console.log("Cần tương tác để phát video"));
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('user-camera').srcObject = localStream;
            } catch(err) { console.error(err); }
        }

        function stopVideoCall() {
            document.getElementById('video-container').style.display = 'none';
            document.getElementById('bot-video-stream').pause();
            if(localStream) { localStream.getTracks().forEach(track => track.stop()); }
        }
    </script>
</body>
</html>
